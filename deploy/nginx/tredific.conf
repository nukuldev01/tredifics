# Tredific® production Nginx config.
# Drop into /etc/nginx/sites-available/tredific and symlink to sites-enabled,
# then run: sudo certbot --nginx -d tredific.com -d www.tredific.com -d api.tredific.com

# --- gzip + caching defaults ---
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_vary on;

# --- www → apex redirect ---
server {
    listen 80;
    server_name www.tredific.com;
    return 301 https://tredific.com$request_uri;
}

# --- Storefront (Next.js) ---
server {
    listen 80;
    server_name tredific.com;
    client_max_body_size 20M;

    # Security headers — Certbot will add SSL ones automatically.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Cache static Next assets aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /tredific-trademark-certificate.pdf {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

# --- API (Django + Gunicorn) ---
server {
    listen 80;
    server_name api.tredific.com;
    client_max_body_size 20M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    # Static (collected by collectstatic) and uploaded media
    location /static/ {
        alias /home/tredific/tredific/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /media/ {
        alias /home/tredific/tredific/backend/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Razorpay webhook — needs raw body, no proxy_buffer rewriting
    location /api/payments/webhook/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
